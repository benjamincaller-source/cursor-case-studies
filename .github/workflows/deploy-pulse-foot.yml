name: Deploy Pulse Foot to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'news-pulse/**'
      - '.github/workflows/deploy-pulse-foot.yml'
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: gh-pages-deploy
  cancel-in-progress: true

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: news-pulse/mobile/package-lock.json

      - name: Install & build
        working-directory: news-pulse
        run: |
          npm install
          cd backend && npm install
          node ../scripts/generate-static-api.js
          cd ../mobile
          npm install --legacy-peer-deps
          npx expo export --platform web

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r news-pulse/mobile/dist/* _site/
          cp -r news-pulse/mobile/public/demo-api _site/demo-api
          touch _site/.nojekyll
          echo '<!DOCTYPE html><html><head><meta http-equiv="refresh" content="0;url=index.html"><title>Pulse Foot</title></head><body><a href="index.html">Pulse Foot</a></body></html>' > _site/404.html

      - name: Deploy to gh-pages branch
        uses: peaceiris/actions-gh-pages@v4
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          publish_dir: ./_site
          publish_branch: gh-pages
          force_orphan: true
          commit_message: 'deploy: pulse foot demo'
