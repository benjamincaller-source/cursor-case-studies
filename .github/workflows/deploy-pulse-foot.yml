name: Deploy Pulse Foot to GitHub Pages

on:
  push:
    branches: [main]
    paths:
      - 'news-pulse/**'
      - '.github/workflows/deploy-pulse-foot.yml'
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  deploy:
    runs-on: ubuntu-latest
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: news-pulse/mobile/package-lock.json

      - name: Install & build
        working-directory: news-pulse
        run: |
          npm install
          cd backend && npm install
          node ../scripts/generate-static-api.js
          cd ../mobile
          npm install --legacy-peer-deps
          npx expo export --platform web

      - name: Prepare site
        run: |
          mkdir -p _site
          cp -r news-pulse/mobile/dist/* _site/
          cp -r news-pulse/mobile/public/demo-api _site/demo-api
          touch _site/.nojekyll

      - uses: actions/configure-pages@v5

      - uses: actions/upload-pages-artifact@v3
        with:
          path: _site

      - id: deployment
        uses: actions/deploy-pages@v4
